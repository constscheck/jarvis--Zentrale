<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060b14">
<title>J.A.R.V.I.S. – Zentrale</title>
<style>
  :root {
    --bg: #060b14; --panel: #0c1626; --line: #15324d;
    --cyan: #35d6ff; --cyan-dim: #1a8db3; --text: #d7e9f5; --dim: #6b8aa3;
    --ok: #3ddc84; --warn: #ffb454;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: radial-gradient(ellipse at 50% -20%, #0d2238 0%, var(--bg) 60%);
    color: var(--text); font-family: "Avenir Next", "Helvetica Neue", system-ui, sans-serif;
    min-height: 100vh; min-height: 100dvh;
  }
  code { background: #102036; border: 1px solid var(--line); border-radius: .35rem;
    padding: .12rem .45rem; font-size: .85em; color: var(--cyan); }
  .punkt { display: inline-block; width: .55rem; height: .55rem; border-radius: 50%; margin-right: .45rem; flex: none; }
  .punkt.ok { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .punkt.warn { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
  .punkt.aus { background: #2a4258; }

  /* ============ MACBOOK / GROSSER BILDSCHIRM ============ */
  body { padding: 1.2rem; }
  header { text-align: center; padding: 1.2rem 0 1.6rem; }
  .reaktor {
    width: 74px; height: 74px; margin: 0 auto .8rem; border-radius: 50%;
    border: 2px solid var(--cyan); position: relative;
    box-shadow: 0 0 24px rgba(53,214,255,.55), inset 0 0 18px rgba(53,214,255,.45);
    animation: puls 3s ease-in-out infinite;
  }
  .reaktor::after {
    content: ""; position: absolute; inset: 16px; border-radius: 50%;
    border: 1.5px solid var(--cyan-dim); box-shadow: inset 0 0 12px rgba(53,214,255,.7);
  }
  @keyframes puls { 50% { box-shadow: 0 0 40px rgba(53,214,255,.9), inset 0 0 24px rgba(53,214,255,.7); } }
  h1 { font-size: 1.5rem; letter-spacing: .45em; font-weight: 600; color: var(--cyan); text-indent: .45em; }
  .untertitel { color: var(--dim); font-size: .85rem; margin-top: .3rem; letter-spacing: .12em; }

  .raster { display: grid; gap: 1rem; max-width: 64rem; margin: 0 auto;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .panel {
    background: linear-gradient(180deg, rgba(53,214,255,.05), rgba(0,0,0,0) 30%), var(--panel);
    border: 1px solid var(--line); border-radius: .9rem; padding: 1.1rem 1.2rem;
  }
  .panel h2 {
    font-size: .8rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--cyan); border-bottom: 1px solid var(--line);
    padding-bottom: .55rem; margin-bottom: .8rem;
  }
  .zeile { display: flex; justify-content: space-between; align-items: center; gap: .8rem;
    padding: .5rem 0; border-bottom: 1px dashed rgba(21,50,77,.6); font-size: .92rem; }
  .zeile:last-child { border-bottom: none; }
  .zeile .l { color: var(--dim); font-size: .8rem; text-align: right; }
  .leer { color: var(--dim); font-size: .88rem; line-height: 1.55; padding: .4rem 0; }
  .agent-name { font-weight: 600; }
  .agent-desc { color: var(--dim); font-size: .8rem; margin-top: .15rem; }
  .status-chips { display: contents; }

  /* ---- Trading-Panel ---- */
  .demo-badge { float: right; font-size: .6rem; letter-spacing: .15em; color: var(--warn);
    border: 1px solid var(--warn); border-radius: .35rem; padding: .1rem .4rem; }
  .konto { text-align: center; padding: .4rem 0 1rem; }
  .konto .label { color: var(--dim); font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; }
  .konto .wert { font-size: 2.2rem; font-weight: 700; color: var(--text); margin-top: .2rem; letter-spacing: .01em; }
  .konto .heute { font-size: .9rem; margin-top: .3rem; }
  .gruen { color: var(--ok); }
  .rot { color: #ff5d6c; }
  .kennzahlen { display: flex; gap: .6rem; margin-bottom: .6rem; }
  .kennzahlen .box { flex: 1; background: #0a1422; border: 1px solid var(--line);
    border-radius: .7rem; padding: .6rem .7rem; text-align: center; }
  .kennzahlen .box .k-label { color: var(--dim); font-size: .68rem; letter-spacing: .08em; }
  .kennzahlen .box .k-wert { font-size: 1.1rem; font-weight: 700; margin-top: .2rem; }
  .pos { display: flex; justify-content: space-between; align-items: center; padding: .55rem 0;
    border-bottom: 1px dashed rgba(21,50,77,.6); }
  .pos:last-child { border-bottom: none; }
  .pos .name { font-weight: 600; }
  .pos .sub { color: var(--dim); font-size: .75rem; }
  .pos .pct { font-weight: 700; font-size: 1rem; white-space: nowrap; }
  footer { text-align: center; color: var(--dim); font-size: .75rem; margin-top: 1.6rem; letter-spacing: .08em; }

  /* ============ HANDY-ANSICHT (eigenes, kompaktes App-Layout) ============ */
  @media (max-width: 640px) {
    body { padding: 0 0 2rem; }

    /* Kompakte App-Kopfleiste statt großem Hero */
    header {
      position: sticky; top: 0; z-index: 10; text-align: left;
      display: flex; align-items: center; gap: .7rem;
      padding: calc(.6rem + env(safe-area-inset-top)) 1rem .6rem;
      background: rgba(6,11,20,.88); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .reaktor { width: 34px; height: 34px; margin: 0; border-width: 1.5px; }
    .reaktor::after { inset: 7px; border-width: 1px; }
    h1 { font-size: 1rem; letter-spacing: .25em; text-indent: 0; }
    .untertitel { font-size: .6rem; margin-top: .1rem; letter-spacing: .08em; }

    /* Eine Spalte, randlose Karten, große Touch-Flächen */
    .raster { display: block; max-width: none; padding: .8rem .8rem 0; }
    .panel { border-radius: 1.1rem; margin-bottom: .8rem; padding: 1rem; }
    .panel h2 { font-size: .72rem; }
    .zeile { padding: .8rem 0; font-size: 1rem; min-height: 2.8rem; }
    .zeile .l { font-size: .78rem; max-width: 40%; }

    /* Status auf dem Handy: Ampel-Chips nebeneinander statt Liste */
    .status-chips { display: flex; flex-wrap: wrap; gap: .5rem; }
    .status-chips .zeile {
      display: inline-flex; flex: 1 1 45%; justify-content: flex-start;
      border: 1px solid var(--line); border-radius: .7rem; border-bottom: 1px solid var(--line);
      padding: .55rem .7rem; font-size: .8rem; min-height: 0; background: #0a1422;
    }
    .status-chips .zeile .l { display: none; }

    footer { font-size: .65rem; padding: 0 1rem; }
  }
</style>
</head>
<body>
<header>
  <div class="reaktor"></div>
  <div>
    <h1>J.A.R.V.I.S.</h1>
    <div class="untertitel">PERSÖNLICHE ZENTRALE · CONSTANTIN SCHECK</div>
  </div>
</header>

<div class="raster">
  <section class="panel">
    <h2>📊 Trading <span class="demo-badge" id="demoBadge">DEMO</span></h2>
    <div class="konto">
      <div class="label">Kontostand</div>
      <div class="wert" id="kontostand"></div>
      <div class="heute" id="kontoHeute"></div>
    </div>
    <div class="kennzahlen">
      <div class="box"><div class="k-label">Gesamt-Rendite</div><div class="k-wert" id="rendite"></div></div>
      <div class="box"><div class="k-label">Positionen</div><div class="k-wert" id="anzahl"></div></div>
    </div>
    <div id="posListe"></div>
  </section>

  <section class="panel">
    <h2>⚡ System-Status</h2>
    <div id="statusListe" class="status-chips"></div>
  </section>

  <section class="panel">
    <h2>🤖 Agenten</h2>
    <div id="agentenListe"></div>
  </section>

  <section class="panel">
    <h2>⌨️ Befehle</h2>
    <div id="befehleListe"></div>
  </section>

  <section class="panel">
    <h2>📋 Nächste Schritte</h2>
    <div id="schritteListe"></div>
  </section>
</div>

<div style="text-align:center; margin:1.4rem 0 .4rem;">
  <a href="privat.html" style="display:inline-block; padding:.7rem 1.4rem; border:1px solid var(--cyan);
     border-radius:.7rem; color:var(--cyan); text-decoration:none; font-weight:600; font-size:.9rem;">
     🔒 Private Ansicht (echte Zahlen)</a>
</div>

<footer>STAND: <span id="stand"></span> · WIRD VON JARVIS GEPFLEGT</footer>

<script>
/* ============================================================
   JARVIS: Diesen Datenblock aktuell halten, wenn sich am System
   etwas ändert (neuer Agent, neuer Befehl, Status, Schritte).
   Danach veröffentlichen: bash werkzeuge/zentrale-veroeffentlichen.sh
   WICHTIG: Keine privaten Daten hier eintragen – die Seite ist
   öffentlich im Internet erreichbar.
   ============================================================ */
const DATEN = {
  stand: "11.06.2026",
  // ⚠️ DEMO-Zahlen. Echte Finanzdaten kommen später in die passwortgeschützte Version,
  //    NIEMALS hier in die öffentliche Online-Seite.
  trading: {
    demo: true,
    kontostand: 24850,           // Euro
    heuteProzent: 1.8,           // Veränderung heute in %
    renditeProzent: 12.4,        // Gesamt-Rendite seit Start in %
    anzahlPositionen: 7,
    beste:    { name: "NVIDIA",  sub: "NVDA",    pct: 34.2 },
    schlechteste: { name: "Bayer", sub: "BAYN", pct: -11.5 }
  },
  status: [
    { name: "Grundgerüst", zustand: "ok",   info: "eingerichtet" },
    { name: "Handy-Verbindung (ntfy)", zustand: "warn", info: "noch einrichten" },
    { name: "Profil", zustand: "warn", info: "noch ausfüllen" }
  ],
  agenten: [
    // { name: "trading-analyst", beschreibung: "Beobachtet die Watchlist…" }
  ],
  befehle: [
    { befehl: "/handy Text",   info: "Nachricht aufs Handy schicken" },
    { befehl: "/neuer-agent",  info: "Neuen Agenten Schritt für Schritt bauen" }
  ],
  schritte: [
    "Profil ausfüllen: Jarvis sagen „Füll mein Profil aus“",
    "Handy verbinden: Anleitung in einstellungen/",
    "Ersten Agenten bauen: /neuer-agent eintippen"
  ]
};

const el = id => document.getElementById(id);
el("stand").textContent = DATEN.stand;

// ---- Trading ----
const proz = n => (n >= 0 ? "+" : "") + n.toLocaleString("de-DE", { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + " %";
const farbe = n => n >= 0 ? "gruen" : "rot";
const posZeile = (titel, p) =>
  `<div class="pos"><div><div class="name">${titel}: ${p.name}</div><div class="sub">${p.sub || ""}</div></div>` +
  `<div class="pct ${farbe(p.pct)}">${proz(p.pct)}</div></div>`;

function zeigeTrading(t) {
  const waehrung = t.waehrung || "EUR";
  const geld = n => n.toLocaleString("de-DE", { style: "currency", currency: waehrung, maximumFractionDigits: 0 });
  el("kontostand").textContent = geld(t.kontostand);
  el("kontoHeute").innerHTML = `<span class="${farbe(t.heuteProzent)}">${proz(t.heuteProzent)} heute</span>`;
  el("rendite").innerHTML = `<span class="${farbe(t.renditeProzent)}">${proz(t.renditeProzent)}</span>`;
  el("anzahl").textContent = t.anzahlPositionen;
  el("posListe").innerHTML = posZeile("🏆 Beste", t.beste) + posZeile("📉 Schwächste", t.schlechteste);
  // Echte Daten? Dann das gelbe DEMO-Schild gegen ein grünes LIVE-Schild tauschen.
  const badge = el("demoBadge");
  if (t.demo === false) {
    badge.textContent = "PAPER · LIVE";
    badge.style.color = "var(--ok)";
    badge.style.borderColor = "var(--ok)";
  }
}

// Erst Demo zeigen, dann versuchen, die echten Paper-Zahlen zu laden (nur lokal vorhanden).
zeigeTrading(DATEN.trading);
fetch("trading-live.json", { cache: "no-store" })
  .then(r => r.ok ? r.json() : null)
  .then(live => { if (live) zeigeTrading(live); })
  .catch(() => {});

el("statusListe").innerHTML = DATEN.status.map(s =>
  `<div class="zeile"><span><span class="punkt ${s.zustand}"></span>${s.name}</span><span class="l">${s.info}</span></div>`
).join("");

el("agentenListe").innerHTML = DATEN.agenten.length
  ? DATEN.agenten.map(a =>
      `<div class="zeile"><div><div class="agent-name"><span class="punkt ok"></span>${a.name}</div><div class="agent-desc">${a.beschreibung}</div></div></div>`
    ).join("")
  : `<p class="leer"><span class="punkt aus"></span>Noch keine Agenten an Bord.<br>Wir bauen sie nach und nach – einfach in Jarvis <code>/neuer-agent</code> eintippen.</p>`;

el("befehleListe").innerHTML = DATEN.befehle.map(b =>
  `<div class="zeile"><code>${b.befehl}</code><span class="l">${b.info}</span></div>`
).join("");

el("schritteListe").innerHTML = DATEN.schritte.map((s, i) =>
  `<div class="zeile"><span><span class="punkt warn"></span>${i + 1}. ${s}</span></div>`
).join("");
</script>
</body>
</html>
